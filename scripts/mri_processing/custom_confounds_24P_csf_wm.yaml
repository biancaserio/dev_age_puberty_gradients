name: custom_confounds_24P_csf_wm
description: |
   Nuisance regressors include 6 motion parameters (trans_x, trans_y, trans_z, rot_x, rot_y, rot_z) and their derivatives and squared terms,
   as well as mean cerebrospinal fluid (CSF) and white matter signals.
confounds:
   preproc_confounds:
      dataset: preprocessed
      query:
         space: null
         cohort: null
         res: null
         den: null
         desc: confounds
         extension: .tsv
         suffix: timeseries
      columns:
      - trans_x
      - trans_y
      - trans_z
      - rot_x
      - rot_y
      - rot_z
      - trans_x_derivative1
      - trans_y_derivative1
      - trans_z_derivative1
      - rot_x_derivative1
      - rot_y_derivative1
      - rot_z_derivative1
      - trans_x_power2
      - trans_y_power2
      - trans_z_power2
      - rot_x_power2
      - rot_y_power2
      - rot_z_power2
      - csf
      - white_matter

